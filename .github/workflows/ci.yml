name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    php-syntax:
        name: PHP Syntax (${{ matrix.php }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ['8.1', '8.2', '8.3']
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none

            - name: Lint all PHP files
              run: |
                  find src tests -name "*.php" -print0 | xargs -0 -n1 -P4 php -l

    composer-validate:
        name: composer.json validate
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  coverage: none

            - name: Validate composer.json
              run: composer validate --strict --no-check-lock

    install-matrix:
        name: Install on Contao ${{ matrix.contao }} / PHP ${{ matrix.php }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - contao: '4.13'
                      php: '8.1'
                    - contao: '5.3'
                      php: '8.2'
                    - contao: '5.0'
                      php: '8.3'
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: intl, pdo_mysql, gd, dom, mbstring
                  coverage: none

            - name: Install dependencies
              run: |
                  composer config minimum-stability dev
                  composer config prefer-stable true
                  composer require --no-update --dev "contao/core-bundle:^${{ matrix.contao }}"
                  composer update --prefer-dist --no-interaction --no-progress
